<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<!-- Viewport tuned for iPhone 11 Safari landscape, no scaling / zoom -->
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
>
<title>VELO CONTROLLER</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Reusable outline-icon sprite. Kept as inline <symbol>s so the whole
       page still works from a plain double-click on index.html - no icon
       font, no external requests. -->
  <svg class="icon-sprite" aria-hidden="true">
    <defs>
      <symbol id="icon-camera" viewBox="0 0 24 24">
        <path d="M3 7.2A1.2 1.2 0 0 1 4.2 6H15l1.6 2.2H19.8A1.2 1.2 0 0 1 21 9.4v7.4a1.2 1.2 0 0 1-1.2 1.2H4.2A1.2 1.2 0 0 1 3 16.8z"/>
        <circle cx="11.6" cy="12.6" r="3.1"/>
      </symbol>
      <symbol id="icon-bike" viewBox="0 0 24 24">
        <circle cx="5.5" cy="18" r="3"/>
        <circle cx="18.5" cy="18" r="3"/>
        <path d="M5.5 18h6L14.5 10h3M11.5 18 14.5 10M18.5 18 14.5 10"/>
        <path d="M13 9.6h3.2"/>
      </symbol>
      <symbol id="icon-cam-left" viewBox="0 0 24 24">
        <circle cx="13" cy="12" r="5"/>
        <circle cx="13" cy="12" r="1.5"/>
        <path d="M3 12h4M5.5 9 3 12l2.5 3"/>
      </symbol>
      <symbol id="icon-cam-right" viewBox="0 0 24 24">
        <circle cx="11" cy="12" r="5"/>
        <circle cx="11" cy="12" r="1.5"/>
        <path d="M21 12h-4M18.5 9 21 12l-2.5 3"/>
      </symbol>
      <symbol id="icon-cam-top" viewBox="0 0 24 24">
        <circle cx="12" cy="14" r="5"/>
        <circle cx="12" cy="14" r="1.5"/>
        <path d="M12 3v4M9 5.5 12 3l3 2.5"/>
      </symbol>
      <symbol id="icon-chevron-left" viewBox="0 0 24 24">
        <path d="M14.5 5.5 8 12l6.5 6.5"/>
      </symbol>
      <symbol id="icon-chevron-right" viewBox="0 0 24 24">
        <path d="M9.5 5.5 16 12l-6.5 6.5"/>
      </symbol>
      <symbol id="icon-eye" viewBox="0 0 24 24">
        <path d="M2 12s4-6.2 10-6.2S22 12 22 12s-4 6.2-10 6.2S2 12 2 12z"/>
        <circle cx="12" cy="12" r="2.5"/>
      </symbol>
      <symbol id="icon-list" viewBox="0 0 24 24">
        <path d="M8.5 6h13M8.5 12h13M8.5 18h13"/>
        <circle cx="3.3" cy="6" r="1.2"/>
        <circle cx="3.3" cy="12" r="1.2"/>
        <circle cx="3.3" cy="18" r="1.2"/>
      </symbol>
      <symbol id="icon-users" viewBox="0 0 24 24">
        <circle cx="8.5" cy="8" r="2.5"/>
        <path d="M3 19c0-3 2.4-5 5.5-5S14 16 14 19"/>
        <circle cx="17" cy="9.2" r="2.1"/>
        <path d="M14.8 19c.3-2.2 2-3.8 3.9-3.8 2.2 0 4 1.7 4.3 3.8"/>
      </symbol>
      <symbol id="icon-jersey" viewBox="0 0 24 24">
        <path d="M8 4 4 6.5 5.5 9.7 8 8.6V20h8V8.6l2.5 1.1 1.5-3.2L16 4l-2 1.6h-4z"/>
        <path d="M12 4v3"/>
      </symbol>
      <symbol id="icon-gear" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="2.5"/>
        <path d="M12 4.5v2M12 17.5v2M19.5 12h-2M6.5 12h-2M17.2 6.8l-1.4 1.4M8.2 15.8l-1.4 1.4M17.2 17.2l-1.4-1.4M8.2 8.2 6.8 6.8"/>
      </symbol>
      <symbol id="icon-flag" viewBox="0 0 24 24">
        <path d="M5.5 21V4"/>
        <path d="M5.5 4.5H15l-2 3 2 3H5.5"/>
      </symbol>
      <symbol id="icon-pause" viewBox="0 0 24 24">
        <path d="M8.5 5v14"/>
        <path d="M15.5 5v14"/>
      </symbol>
      <symbol id="icon-play" viewBox="0 0 24 24">
        <path d="M7.5 5v14l11-7z"/>
      </symbol>
      <symbol id="icon-restart" viewBox="0 0 24 24">
        <path d="M4.5 12a7.5 7.5 0 1 1 2.4 5.5"/>
        <path d="M4.5 17.2v-5h5"/>
      </symbol>
      <symbol id="icon-clock" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8.3"/>
        <path d="M12 7.6V12l3.1 1.9"/>
      </symbol>
      <symbol id="icon-send" viewBox="0 0 24 24">
        <path d="M3 11.6 20.5 4 13 21.5l-2.3-7.3L3 11.6z"/>
        <path d="M10.7 14.2 20.5 4"/>
      </symbol>
      <symbol id="icon-terminal" viewBox="0 0 24 24">
        <path d="M4 5h16v14H4z"/>
        <path d="M7.3 9.5l3 2.5-3 2.5M12.8 14.5h4"/>
      </symbol>
      <symbol id="icon-helicopter" viewBox="0 0 24 24">
        <ellipse cx="9.5" cy="14.5" rx="5.5" ry="3.1"/>
        <path d="M15 14h6.5"/>
        <path d="M4.5 7.5h11"/>
        <path d="M10 10V7.5"/>
        <path d="M6 17.6h6.5M6.8 17.6v1.8M12 17.6v1.8"/>
      </symbol>
    </defs>
  </svg>

  <!-- Shown only in portrait orientation via CSS -->
  <div id="rotate-overlay" class="rotate-overlay">
    <svg class="icon rotate-icon"><use href="#icon-bike"></use></svg>
    <p>Otočte telefon na šířku</p>
  </div>

  <div id="app" class="app">

    <!-- 1. Top info bar - styled like a broadcast telemetry strip -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-name">VELO<span class="brand-name-sub">CONTROLLER</span></span>
        <span class="brand-stripe" aria-hidden="true"></span>
      </div>

      <div class="topbar-center">
        <span class="topbar-tag">CAMERA:</span>
        <span id="camera-label" class="topbar-value">Rear</span>
      </div>

      <div class="topbar-right">
        <div class="status-block">
          <span class="status-tag">STATUS</span>
          <div id="connection-value" class="status-value offline">
            <span id="connection-dot" class="status-dot offline"></span>
            <span id="connection-text">OFFLINE</span>
          </div>
        </div>
        <span class="topbar-divider" aria-hidden="true"></span>
        <!-- Visual only - settings are not wired up yet -->
        <button class="icon-btn" type="button" tabindex="-1" aria-hidden="true" disabled>
          <svg class="icon"><use href="#icon-gear"></use></svg>
        </button>
      </div>
    </header>

    <!-- 2. Main control area -->
    <main class="main">

      <!-- Camera column -->
      <section class="panel camera-panel">
        <h2 class="panel-title">
          <svg class="icon"><use href="#icon-camera"></use></svg>
          CAMERA
        </h2>

        <div class="camera-grid">
          <button class="btn cam-btn active" data-camera="rear" data-command="camera_rear">
            <svg class="cam-icon"><use href="#icon-bike"></use></svg>
            <span>ZA JEZDCEM</span>
          </button>
          <button class="btn cam-btn" data-camera="front" data-command="camera_front">
            <svg class="cam-icon cam-icon-flip"><use href="#icon-bike"></use></svg>
            <span>PŘED JEZDCEM</span>
          </button>
          <button class="btn cam-btn" data-camera="left" data-command="camera_left">
            <svg class="cam-icon"><use href="#icon-cam-left"></use></svg>
            <span>LEVÁ STRANA</span>
          </button>
          <button class="btn cam-btn" data-camera="right" data-command="camera_right">
            <svg class="cam-icon"><use href="#icon-cam-right"></use></svg>
            <span>PRAVÁ STRANA</span>
          </button>
          <button class="btn cam-btn" data-camera="top" data-command="camera_top">
            <svg class="cam-icon"><use href="#icon-cam-top"></use></svg>
            <span>NAD JEZDCEM</span>
          </button>
          <button class="btn cam-btn" data-camera="helicopter" data-command="camera_helicopter">
            <svg class="cam-icon"><use href="#icon-helicopter"></use></svg>
            <span>HELIKOPTÉRA</span>
          </button>
        </div>

        <div class="camera-nav">
          <button class="btn nav-btn" data-command="camera_previous">
            <svg class="icon"><use href="#icon-chevron-left"></use></svg>
            PŘEDCHOZÍ KAMERA
          </button>
          <button class="btn nav-btn" data-command="camera_next">
            DALŠÍ KAMERA
            <svg class="icon"><use href="#icon-chevron-right"></use></svg>
          </button>
        </div>
      </section>

      <!-- Rider / UI column -->
      <section class="panel rider-panel">
        <h2 class="panel-title">
          <svg class="icon"><use href="#icon-bike"></use></svg>
          JEZDEC / ROZHRANÍ
        </h2>

        <div class="rider-nav">
          <button class="btn rider-btn" data-command="rider_previous">
            <svg class="icon"><use href="#icon-chevron-left"></use></svg>
            PŘEDCHOZÍ JEZDEC
          </button>
          <button class="btn rider-btn" data-command="rider_next">
            DALŠÍ JEZDEC
            <svg class="icon"><use href="#icon-chevron-right"></use></svg>
          </button>
        </div>

        <div class="rider-card">
          <svg class="icon rider-card-icon"><use href="#icon-jersey"></use></svg>
          <div class="rider-card-text">
            <span class="rider-card-label">SLEDOVANÝ JEZDEC</span>
            <span class="rider-card-value" id="selected-rider">Player</span>
          </div>
        </div>

        <button class="btn switch-row" data-command="toggle_hud" data-enabled="true">
          <svg class="icon"><use href="#icon-eye"></use></svg>
          <span class="switch-label">HUD</span>
          <span class="switch" aria-hidden="true"><span class="switch-knob"></span></span>
        </button>

        <button class="btn switch-row" data-command="toggle_leaderboard" data-enabled="true">
          <svg class="icon"><use href="#icon-list"></use></svg>
          <span class="switch-label">LEADERBOARD</span>
          <span class="switch" aria-hidden="true"><span class="switch-knob"></span></span>
        </button>

        <button class="btn switch-row" data-command="toggle_name_tags" data-enabled="true">
          <svg class="icon"><use href="#icon-users"></use></svg>
          <span class="switch-label">JMENOVKY JEZDCŮ</span>
          <span class="switch" aria-hidden="true"><span class="switch-knob"></span></span>
        </button>
      </section>

      <!-- Race column - now wired to pause_race / resume_race / restart_race -->
      <section class="panel race-panel">
        <h2 class="panel-title">
          <svg class="icon"><use href="#icon-flag"></use></svg>
          ZÁVOD
        </h2>

        <button class="btn race-btn" data-command="pause_race">
          <svg class="icon"><use href="#icon-pause"></use></svg>
          PAUZA
        </button>
        <button class="btn race-btn" data-command="resume_race">
          <svg class="icon"><use href="#icon-play"></use></svg>
          POKRAČOVAT
        </button>
        <!-- restart_race is only sent after the confirm() dialog in script.js -->
        <button class="btn race-btn race-btn-danger" data-command="restart_race">
          <svg class="icon"><use href="#icon-restart"></use></svg>
          RESTARTOVAT ZÁVOD
        </button>
      </section>

    </main>

    <!-- 3. Bottom telemetry strip -->
    <footer class="statusbar">
      <div class="status-cell">
        <svg class="icon"><use href="#icon-terminal"></use></svg>
        <div class="status-cell-text">
          <span class="status-cell-label">POSLEDNÍ PŘÍKAZ</span>
          <span class="status-cell-value" id="command-label">None</span>
        </div>
      </div>

      <span class="status-divider" aria-hidden="true"></span>

      <div class="status-cell">
        <svg class="icon"><use href="#icon-clock"></use></svg>
        <div class="status-cell-text">
          <span class="status-cell-label">ČAS PŘÍKAZU</span>
          <span class="status-cell-value muted" id="command-time">--:--:--</span>
        </div>
      </div>

      <span class="status-divider" aria-hidden="true"></span>

      <div class="status-cell">
        <svg class="icon"><use href="#icon-send"></use></svg>
        <div class="status-cell-text">
          <span class="status-cell-label">ODESLANÉ PŘÍKAZY</span>
          <span class="status-cell-value muted" id="command-count">0</span>
        </div>
      </div>

      <span class="version-tag">v0.1</span>
    </footer>

  </div>

<script src="script.js"></script>
</body>
</html>
